Global:
  device: gpu
  epoch_num: 150
  log_smooth_window: 20
  print_batch_step: 10
  output_dir: ./output/rec/svtrv2_phd_final/
  save_epoch_step: [15, 1]
  eval_epoch_step: [0, 1]
  eval_batch_step: [0, 500]
  cal_metric_during_train: True
  pretrained_model: /content/SVTRv2_many/SVTRv2/tiny/best.pth
  checkpoints:
  use_tensorboard: false
  infer_img:
  character_dict_path: &character_dict_path ./tools/utils/license_plate_vn_dict.txt
  max_text_length: &max_text_length 25
  use_space_char: &use_space_char False
  save_res_path: ./output/rec/predicts_phd.txt
  use_amp: True

Optimizer:
  name: AdamW
  lr: 0.00065
  weight_decay: 0.05
  filter_bias_and_bn: True

LRScheduler:
  name: OneCycleLR
  warmup_epoch: 1.5
  cycle_momentum: False

Architecture:
  model_type: rec
  algorithm: SVTRv2
  Transform:
  Encoder:
    name: SVTRv2LNConvTwo33
    use_pos_embed: False
    dims: [64, 128, 256]
    depths: [3, 6, 3]
    num_heads: [2, 4, 8]
    mixer: [['Conv','Conv','Conv'],['Conv','Conv','Conv','FGlobal','Global','Global'],['Global','Global','Global']]
    local_k: [[5, 5], [5, 5], [-1, -1]]
    sub_k: [[1, 1], [2, 1], [-1, -1]]
    last_stage: false
    feat2d: True
  Decoder:
    name: GTCDecoder
    infer_gtc: True
    detach: False
    gtc_decoder:
      name: SMTRDecoder
      num_layer: 1
      ds: True
      max_len: *max_text_length
      next_mode: &next True
      sub_str_len: &subsl 5
    ctc_decoder:
      name: SimpleRCTCDecoder # FRM REMOVED HERE
      out_channels: 38 # Updated by trainer

Distill:
  Teacher:
    model_type: rec
    algorithm: SVTRv2
    Encoder:
      name: SVTRv2LNConvTwo33
      use_pos_embed: False
      dims: [128, 256, 384]
      depths: [6, 6, 6]
      num_heads: [4, 8, 12]
      mixer: [['Conv','Conv','Conv','Conv','Conv','Conv'],['Conv','Conv','FGlobal','Global','Global','Global'],['Global','Global','Global','Global','Global','Global']]
      local_k: [[5, 5], [5, 5], [-1, -1]]
      sub_k: [[1, 1], [2, 1], [-1, -1]]
      last_stage: false
      feat2d: True
    Decoder:
      name: RCTCDecoder
      out_channels: 38
  teacher_path: /content/SVTRv2_many/SVTRv2/base/best.pth
  FreqLoss:
    name: FreqLoss
    hp_ratio: 0.1
  freq_weight: 0.5 # Reduced slightly to let SGM lead

Loss:
  name: GTCLoss
  ctc_weight: 0.1 #λ1 = 0.1 theo chuyên gia
  gtc_loss:
    name: SMTRLoss

PostProcess:
  name: GTCLabelDecode
  gtc_label_decode:
    name: SMTRLabelDecode
    next_mode: *next
  character_dict_path: *character_dict_path
  use_space_char: *use_space_char

Metric:
  name: RecMetric
  main_indicator: acc
  is_filter: True

Train:
  dataset:
    name: RatioDataSetTVResize
    ds_width: True
    padding: False
    data_dir_list: ['/content/ocr-license-plate-lmdb-dataset/train']
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - PARSeqAugPIL:
      - GTCLabelEncode:
          gtc_label_encode:
            name: LicensePlateSMTRLabelEncode # HACKED SGM HERE
            sub_str_len: *subsl
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - KeepKeys:
          keep_keys: ['image', 'label', 'label_subs', 'label_next', 'length_subs', 'label_subs_pre', 'label_next_pre', 'length_subs_pre', 'length', 'ctc_label', 'ctc_length']
  sampler:
    name: RatioSampler
    scales: [[128, 32], [96, 32], [64, 48]]
    first_bs: &bs 256
    fix_bs: false
    divided_factor: [4, 16]
    is_training: True
  loader:
    shuffle: True
    batch_size_per_card: *bs
    drop_last: True
    max_ratio: 4
    num_workers: 4

Eval:
  dataset:
    name: RatioDataSetTVResize
    ds_width: True
    padding: False
    data_dir_list: ['/content/ocr-license-plate-lmdb-dataset/val']
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - GTCLabelEncode:
          gtc_label_encode:
            name: ARLabelEncode
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - KeepKeys:
          keep_keys: ['image', 'label', 'length', 'ctc_label', 'ctc_length']
  sampler:
    name: RatioSampler
    scales: [[128, 32], [96, 32], [64, 48]]
    first_bs: 256
    fix_bs: false
    divided_factor: [4, 16]
    is_training: False
  loader:
    shuffle: False
    drop_last: False
    batch_size_per_card: *bs
    max_ratio: 4
    num_workers: 4
