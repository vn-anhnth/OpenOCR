Global:
  device: gpu
  epoch_num: 500
  log_smooth_window: 20
  print_batch_step: 10
  output_dir: ./output/rec/svtrv2_pico_fakd_rctc/
  save_epoch_step: [0, 3]
  eval_epoch_step: [0, 10]
  eval_batch_step: [0, 999999999]
  cal_metric_during_train: True
  pretrained_model: 
  checkpoints:
  use_tensorboard: false
  use_wandb: True
  wandb_project: OpenOCR_SVTR_new_method
  run_name: svtrv2_pico_fakd_rctc
  infer_img:
  character_dict_path: &character_dict_path ./tools/utils/license_plate_vn_dict.txt
  max_text_length: &max_text_length 25
  use_space_char: &use_space_char False
  save_res_path: ./output/rec/predicts_svtrv2_pico.txt
  use_amp: True

Optimizer:
  name: AdamW
  lr: 0.0013
  weight_decay: 0.05
  filter_bias_and_bn: True

LRScheduler:
  name: OneCycleLR
  warmup_epoch: 10
  cycle_momentum: False

Architecture:
  model_type: rec
  name: DistillationRecognizer
  algorithm: SVTRv2

  Student:
    in_channels: 3
    Encoder:
      name: SVTRv2LNConvTwo33
      use_pos_embed: False
      dims: [48, 96, 192] # Reduce channels (Pico)
      depths: [2, 4, 2]   # Reduce depths (Pico)
      num_heads: [2, 4, 8]
      mixer: [['Conv','Conv'],['Conv','Conv','FGlobal','Global'],['Global','Global']]
      local_k: [[5, 5], [5, 5], [-1, -1]]
      sub_k: [[1, 1], [2, 1], [-1, -1]]
      last_stage: false
      feat2d: True
    Decoder:
      name: RCTCDecoder

  Teacher:
    pretrained: /content/SVTRv2_many/svtrv2_tiny_rctc/best.pth
    in_channels: 3
    Encoder:
      name: SVTRv2LNConvTwo33
      use_pos_embed: False
      dims: [64, 128, 256] # Tiny channels
      depths: [3, 6, 3]    # Tiny depths
      num_heads: [2, 4, 8]
      mixer: [['Conv','Conv','Conv'],['Conv','Conv','Conv','FGlobal','Global','Global'],['Global','Global','Global']]
      local_k: [[5, 5], [5, 5], [-1, -1]]
      sub_k: [[1, 1], [2, 1], [-1, -1]]
      last_stage: false
      feat2d: True
    Decoder:
      name: RCTCDecoder

Loss:
  name: DistillationCTCLoss
  weight_ctc: 1.0
  weight_fakd: 1.0
  alpha: 0.5  # High-frequency filter threshold (0.0 to 1.0)
  zero_infinity: True

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  is_filter: True

Train:
  dataset:
    name: RatioDataSetTVResize
    ds_width: True
    padding: False
    data_dir_list: ['/content/ocr-license-plate-lmdb-dataset/train']
    transforms:
      - DecodeImagePIL: # load image
          img_mode: RGB
      - PARSeqAugPIL:
      - CTCLabelEncode: # Class handling label
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  sampler:
    name: RatioSampler
    scales: [[128, 32]] # w, h
    first_bs: &bs 1024
    fix_bs: false
    divided_factor: [4, 16] # w, h
    is_training: True
  loader:
    shuffle: True
    batch_size_per_card: *bs
    drop_last: True
    num_workers: 8

Eval:
  dataset:
    name: RatioDataSetTVResize
    ds_width: True
    padding: False
    data_dir_list: ['/content/ocr-license-plate-lmdb-dataset/val']
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - CTCLabelEncode: # Class handling label
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  sampler:
    name: RatioSampler
    scales: [[128, 32]] # w, h
    first_bs: *bs
    fix_bs: false
    divided_factor: [4, 16] # w, h
    is_training: False
  loader:
    shuffle: False
    drop_last: False
    batch_size_per_card: *bs
    num_workers: 4
