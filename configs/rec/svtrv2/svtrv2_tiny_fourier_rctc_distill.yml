Global:
  device: gpu
  epoch_num: 300
  log_smooth_window: 20
  print_batch_step: 10
  output_dir: ./output/rec/svtrv2_tiny_fourier_rctc_distill/
  save_epoch_step: [0, 10]
  eval_epoch_step: [0, 10]
  eval_batch_step: [0, 999999999]
  cal_metric_during_train: True
  pretrained_model:
  checkpoints:
  use_tensorboard: false
  use_wandb: True
  wandb_project: OpenOCR_SVTR_new_method
  run_name: svtrv2_tiny_fourier_rctc_distill
  character_dict_path: &character_dict_path ./tools/utils/license_plate_vn_dict.txt
  max_text_length: &max_text_length 25
  use_space_char: &use_space_char False
  save_res_path: ./output/rec/predicts_svtrv2_distill.txt
  use_amp: True

Optimizer:
  name: AdamW
  lr: 0.00065
  weight_decay: 0.05
  filter_bias_and_bn: True

LRScheduler:
  name: OneCycleLR
  warmup_epoch: 10
  cycle_momentum: False

Architecture:
  model_type: rec
  algorithm: Distillation
  models:
    - Teacher:
        pretrained: /content/SVTRv2_many/svtrv2_tiny_rctc/best.pth
        freeze: True
        Transform:
        Encoder:
          name: SVTRv2LNConvTwo33
          use_pos_embed: False
          dims: [64, 128, 256]
          depths: [3, 6, 3]
          num_heads: [2, 4, 8]
          mixer: [['Conv','Conv','Conv'],['Conv','Conv','Conv','FGlobal','Global','Global'],['Global','Global','Global']]
          local_k: [[5, 5], [5, 5], [-1, -1]]
          sub_k: [[1, 1], [2, 1], [-1, -1]]
          feat2d: True
        Decoder:
          name: RCTCDecoder
    - Student:
        pretrained: /content/SVTRv2_many/SVTRv2/best.pth
        Transform:
        Encoder:
          name: SVTRv2LNConvTwo33
          use_pos_embed: False
          dims: [64, 128, 256]
          depths: [3, 6, 3]
          num_heads: [2, 4, 8]
          mixer: [['Conv','Conv','Fourier'],['Conv','Conv','Fourier','Fourier','Fourier','Fourier'],['Fourier','FGlobal','Global']]
          local_k: [[5, 5], [5, 5], [-1, -1]]
          sub_k: [[1, 1], [2, 1], [-1, -1]]
          feat2d: True
        Decoder:
          name: RCTCDecoder

Loss:
  name: DistillationLoss
  models_loss_config:
    - Student:
        name: CTCLoss
        weight: 1.0
    - Teacher:
        name: CTCLoss
        weight: 0.0
  distill_loss_config:
    name: DistillKL
    weight: 1.0
    temperature: 1.0
    feat_weight: 0.1
    teacher_name: Teacher
    student_name: Student

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  is_filter: True

Train:
  dataset:
    name: RatioDataSetTVResize
    ds_width: True
    padding: False
    data_dir_list: ['/content/ocr-license-plate-lmdb-dataset/train']
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - PARSeqAugPIL:
      - CTCLabelEncode:
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  sampler:
    name: RatioSampler
    scales: [[128, 32]]
    first_bs: &bs 128 # Reduced batch size for distillation (memory)
    fix_bs: false
    divided_factor: [4, 16]
    is_training: True
  loader:
    shuffle: True
    batch_size_per_card: *bs
    drop_last: True
    max_ratio: 4
    num_workers: 8

Eval:
  dataset:
    name: RatioDataSetTVResize
    ds_width: True
    padding: False
    data_dir_list: ['/content/ocr-license-plate-lmdb-dataset/val']
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - CTCLabelEncode:
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  sampler:
    name: RatioSampler
    scales: [[128, 32]]
    first_bs: 128
    fix_bs: false
    divided_factor: [4, 16]
    is_training: False
  loader:
    shuffle: False
    drop_last: False
    batch_size_per_card: *bs
    max_ratio: 4
    num_workers: 4
